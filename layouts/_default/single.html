<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} — {{ .Site.Title }}</title>
  <meta name="description" content="{{ .Params.description }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #F2F2EF;
      --bg-card:     #EBEBE8;
      --bg-subtle:   #E6E6E3;

      --ink:         #2C3E50;
      --ink-muted:   #4A5568;
      --ink-faint:   #718096;
      --border:      #D4D4CF;
      --border-soft: #E0E0DC;

      --blue:        #4A7FA5;
      --blue-hover:  #3A6A8E;
      --blue-bg:     #EBF2F7;
      --blue-border: #BDD4E4;

      --font-serif: 'Lora', Georgia, serif;
      --font-mono:  'IBM Plex Mono', monospace;
      --font-sans:  'IBM Plex Sans', sans-serif;

      --radius:      4px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::selection {
      background: var(--blue);
      color: var(--bg);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
      font-size: 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    /* NAV */
    nav {
      padding: 2.5rem 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--border);
    }

    .nav-name {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-faint);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--blue); }

    /* ARTICLE */
    .article {
      padding: 4rem 0 3rem;
    }

    .article-back {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-faint);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
      display: inline-block;
      margin-bottom: 3rem;
    }

    .article-back:hover { color: var(--blue); }

    .article-title {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 600;
      line-height: 1.25;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .article-meta {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 3rem;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.55rem;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      color: var(--ink-faint);
      border-radius: 2px;
    }

    /* ARTICLE BODY */
    .article-body {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--ink);
    }

    .article-body > * + * {
      margin-top: 1.5rem;
    }

    .article-body img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
    }

    .article-body figure {
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .article-body figcaption {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-faint);
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }

    .article-body h2 {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
      margin-top: 3rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .article-body h3 {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--ink);
      margin-top: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .article-body p {
      color: var(--ink-muted);
    }

    .article-body a {
      color: var(--blue);
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.2s;
    }

    .article-body a:hover {
      color: var(--blue-hover);
    }

    .article-body strong {
      font-weight: 600;
      color: var(--ink);
    }

    .article-body code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: var(--bg-subtle);
      border: 1px solid var(--border-soft);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    .article-body pre {
      background: var(--ink);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .article-body pre code {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--bg);
      background: none;
      border: none;
      padding: 0;
      border-radius: 0;
    }

    .article-body ul,
    .article-body ol {
      padding-left: 1.5rem;
      color: var(--ink-muted);
    }

    .article-body li + li {
      margin-top: 0.4rem;
    }

    .article-body blockquote {
      border-left: 3px solid var(--blue);
      padding-left: 1.25rem;
      color: var(--ink-muted);
      font-style: italic;
    }

    .article-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    /* FOOTER */
    footer {
      padding: 3rem 0;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--ink-faint);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--blue); }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .container { padding: 0 2rem; }
      nav { flex-wrap: wrap; gap: 1rem; }
      .nav-links { gap: 1.25rem; }
      .article { padding: 2.5rem 0 2rem; }
      .article-back { margin-bottom: 2rem; }
      .article-body pre { padding: 1rem; }
      footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
      .footer-links { flex-wrap: wrap; gap: 1rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-name">{{ .Site.Title }}</a>
    <ul class="nav-links">
      <li><a href="/#projects">projects</a></li>
      <li><a href="/#writing">writing</a></li>
    </ul>
  </nav>

  <!-- ARTICLE -->
  <article class="article">
    <a href="/" class="article-back">&larr; back</a>

    <h1 class="article-title">{{ .Title }}</h1>
    <p class="article-meta">{{ .Date.Format "Jan 2, 2006" }} &middot; {{ .ReadingTime }} min read</p>

    {{ with .Params.tags }}
    <div class="article-tags">
      {{ range . }}
      <span class="tag">{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}

    <div class="article-body">
      {{ .Content }}
    </div>
  </article>

  <!-- FOOTER -->
  <footer>
    <span class="footer-copy">robin vidal, 2026</span>
    <div class="footer-links">
      <a href="{{ .Site.Params.github }}">github</a>
      <a href="{{ .Site.Params.resume }}">resume</a>
      <a href="{{ .Site.Params.linkedin }}">linkedin</a>
      <a href="mailto:robin.vidal.pro@gmail.com">mail</a>
    </div>
  </footer>

</div>

</body>
</html>
